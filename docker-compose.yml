version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moss-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/moss_memory.db:/app/moss_memory.db
      - ./my-vertexai-key.json:/app/my-vertexai-key.json
    env_file:
      - ./backend/.env
    environment:
      - GIN_MODE=release
      - OLLAMA_API_BASE=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moss-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
